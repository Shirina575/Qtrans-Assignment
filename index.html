<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Qtrans-Assignment</title>
    <link rel="stylesheet" href="css/all.css">
    <link rel="stylesheet" href="css/fontawesome.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-KyZXEAg3QhqLMpG8r+8fhAXLRk2vvoC2f3B09zVXn8CA5QIVfZOJ3BCsw2P0p/We" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Itim&display=swap" rel="stylesheet">

</head>
<body>
<div class="container">
        <!-- Navbar -->
        <nav class="navbar navbar-expand-lg navbar-light bg-light">
            <div class="container-fluid">
              <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarTogglerDemo03" aria-controls="navbarTogglerDemo03" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
              </button>
              <a class="navbar-brand" href="#">TransPack</a>
              <button class="btn bg-white">
                <span class="navbar-toggler-icon"></span>
              </button>
              <div class="collapse navbar-collapse" id="navbarTogglerDemo03">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                  <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#"></a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Dashboard</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Packages</a>
                  </li>
                  <li class="nav-item">
                    <a class="nav-link" href="#">Reports</a>
                  </li>
                </ul>
              </div>
            </div>
          </nav>
          <!-- Navbar Ends -->
          <!-- Carousel -->
          <div id="carouselExampleCaptions" class="carousel slide" data-bs-ride="carousel">
            <div class="carousel-indicators">
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="0" class="active" aria-current="true" aria-label="Slide 1"></button>
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="1" aria-label="Slide 2"></button>
              <button type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide-to="2" aria-label="Slide 3"></button>
            </div>
            <div class="carousel-inner">
              <div class="carousel-item active">
                <img src="images/qtrans1.jpg" class="d-block w-100" alt="...">
                <div class="carousel-caption d-none d-md-block">
                  <h5>Qtrans</h5>
                  <p>language Services</p>
                </div>
              </div>
              <div class="carousel-item">
                <img src="images/qtrans2.jpg" class="d-block w-100" alt="...">
                <div class="carousel-caption d-none d-md-block">
                  <h5>Qtrans</h5>
                  <p>Language Market</p>
                </div>
              </div>
              <div class="carousel-item">
                <img src="images/qtrans1.jpg" class="d-block w-100" alt="...">
                <div class="carousel-caption d-none d-md-block">
                  <h5>Qtrans</h5>
                  <p>Language Market</p>
                </div>
              </div>
            </div>
            <button class="carousel-control-prev" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="prev">
              <span class="carousel-control-prev-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Previous</span>
            </button>
            <button class="carousel-control-next" type="button" data-bs-target="#carouselExampleCaptions" data-bs-slide="next">
              <span class="carousel-control-next-icon" aria-hidden="true"></span>
              <span class="visually-hidden">Next</span>
            </button>
          </div>
          <!-- Carousel End -->
          <div class="text-center mt-4"><span class="fw-bold">Packages</span> | <span>create package</span></div>
          <div class="row g-2 mt-2 m-lg-3 p-5 border border-white">
            <div class="col-md">
                <div class="row g-2 mt-2">
                    <div class="col-md">
                        <div class="col-md">
                            <div class="form-floating">
                                <h5>Package Type</h5>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault">
                                    <label class="form-check-label">
                                      Translation
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault">
                                    <label class="form-check-label">
                                      Proofreading
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault">
                                    <label class="form-check-label">
                                      TEP
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault">
                                    <label class="form-check-label">
                                      Other
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="col-md">
                        <div class="col-md">
                            <div class="form-floating">
                                <h5>Field of Text</h5>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault1">
                                    <label class="form-check-label">
                                      General Domain
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault1">
                                    <label class="form-check-label">
                                      Technical Domain
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault1">
                                    <label class="form-check-label">
                                      Medical Domain
                                    </label>
                                </div>
                                <div class="form-check">
                                    <input class="form-check-input" type="radio" name="flexRadioDefault1">
                                    <label class="form-check-label">
                                      Other
                                    </label>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
              <div class="mt-5">
                <input type="text" class="form-control mt-4" placeholder="Number of Words">
                <input type="text" class="form-control mt-4" placeholder="Type Duration">
                <input type="text" class="form-control mt-4" placeholder="Discount">
              </div>
            </div>
            <div class="col-md form-margin">
                <div class="row g-2 mt-2">
                    <div class="col-md">
                        <div class="col-md">
                            <div class="form-floating">
                                <select aria-label="Floating label select example">
                                    <option selected>arabic</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                  </select>
                                <button class="button mt-4">+Add More</button>
                            </div>
                        </div>
                    </div>
                    <div class="col-md">
                        <div class="col-md">
                            <div class="form-floating mb-3">
                                <select class="mb-4" aria-label="Floating label select example">
                                    <option selected>english</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                  </select>
                                <select class="mb-4" aria-label="Floating label select example">
                                    <option selected>german</option>
                                    <option value="1">One</option>
                                    <option value="2">Two</option>
                                    <option value="3">Three</option>
                                  </select>
                            </div>
                        </div>
                    </div>
                </div>
              <div class="form-floating">
                <div class="form-group row mt-5">
                    <label class="col-sm-5 fw-bold">Is complementary: </label>
                    <div class="col-sm-7">
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio1" value="option1">
                            <label class="form-check-label" for="inlineRadio1">Yes</label>
                        </div>
                        <div class="form-check form-check-inline">
                            <input class="form-check-input" type="radio" name="inlineRadioOptions" id="inlineRadio2" value="option2">
                            <label class="form-check-label" for="inlineRadio2">No</label>
                        </div>
                    </div>
                </div>
              </div>
              <div class="mt-5">
                <input type="text" class="form-control mt-4" placeholder="Type Name">
                <input type="text" class="form-control mt-4" placeholder="Type Email">
              </div>
            </div>
          </div>

          <div class="text-center pb-2 border-bottom border-white">
              <button class="button">Calculate</button>
              <button class="button">Reset</button>
          </div>
          <div class="d-flex justify-content-center">
            <p class="fw-bold mx-4">TransPack</p>
            <span><i class="fab fa-facebook mx-2 text-primary"></i></span>
            <span><i class="fab fa-google mx-2 text-danger"></i></span>
            <span><i class="fab fa-twitter mx-2 text-primary"></i></span>
            <span><i class="fab fa-linkedin mx-2 text-primary"></i></span>
          </div>
          <div>
            <p class="text-center pb-3">Copyright&copy; 2021. All right reserved.</p>
          </div>
</div>
    <script src="app.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.0/dist/js/bootstrap.bundle.min.js" integrity="sha384-U1DAWAznBHeqEIlVSCgzq+c9gqGAJn5c/t99JyeKa9xxaYpSvHU5awsuZVVFIhvj" crossorigin="anonymous"></script>
</body>
</html>
